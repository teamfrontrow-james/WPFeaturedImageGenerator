name: Bug report
description: Report a reproducible problem with WP Auto-Feature Gen.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: wordpress
    attributes:
      label: WordPress version
      placeholder: "6.7"
    validations:
      required: true
  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Public production site
        - Public staging site
        - Localhost/private site
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the filter settings, dashboard status, and any relevant redacted debug-log lines.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Do not include API keys, private content, or unpublished generated image URLs.

